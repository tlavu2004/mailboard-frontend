server {
    listen 80;
    server_name localhost;

    # Route API requests to backend - PASS THROUGH WITHOUT CHANGING PATH
    location /api/v1/ {
        # Using service name 'app' as defined in global docker network
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service Worker - must be served with special headers
    location = /sw.js {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_hide_header Content-Type;
        add_header Cache-Control "public, max-age=300, must-revalidate";
        add_header Service-Worker-Allowed "/";
        add_header Content-Type "application/javascript";
        add_header X-Content-Type-Options "nosniff";
    }

    # Workbox chunks (generated by next-pwa)
    location ~* ^/workbox-.*\.js$ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA Manifest
    location = /manifest.json {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Route all other requests to frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js specific headers for HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
